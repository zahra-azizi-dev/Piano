</body>
<script>
    const volomeSLder = document.querySelector('.volomeSLder input')
    const keyCheackbox = document.querySelector('.keyCheackbox input')
    const pianoKeys = document.querySelectorAll('.pianoKeys li')
    let currentVolume = 0.5
    let audio = null
    pianoKeys.forEach((val) => {
        val.addEventListener('click', () => {
            playNote(val)




        })

    });
    volomeSLder.addEventListener('input', (e) => {
        currentVolume = Number(e.target.value)
        console.log(currentVolume)
        if (audio != null) {
            audio.volume = currentVolume

        }



    })
    document.addEventListener('keydown', (e) => {
        let type = e.key.toLowerCase()
        let alpha = document.querySelector(`[data-key='${type}']`)
        console.log("down", e.key)

        if (alpha != null) {
            playNote(alpha)

        }

    })
    function playNote(val) {
        let temp = val.dataset.key
        let path = "stylesheet/tunes/" + temp + ".wav"
        audio = new Audio(path)
        audio.volume = currentVolume

        audio.play()
        val.classList.add('key-pressed')
        // console.log("temp:", temp)
        // console.log("path:", path)

        setTimeout(() => {
            val.classList.remove('key-pressed')

        }, 100)

    }
//     keyCheackbox.addEventListener('change', () => {
//     pianoList.classList.toggle('hide-keys')

// })
</script>
